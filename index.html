<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Калькулятор</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f6fb;
        color: #182033;
        font-family: Arial, sans-serif;
      }

      .calculator {
        width: min(92vw, 360px);
        padding: 20px;
        background: #ffffff;
        border: 1px solid #d9e0ec;
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(24, 32, 51, 0.12);
      }

      .display {
        width: 100%;
        min-height: 72px;
        margin-bottom: 16px;
        padding: 14px;
        border: 1px solid #ccd5e3;
        border-radius: 6px;
        background: #f8fafc;
        color: #111827;
        font-size: 32px;
        line-height: 1.2;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        min-height: 56px;
        border: 0;
        border-radius: 6px;
        background: #e7edf6;
        color: #182033;
        font-size: 20px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
      }

      button:hover {
        background: #d9e4f2;
      }

      button:active {
        transform: translateY(1px);
      }

      .operator {
        background: #3563e9;
        color: #ffffff;
      }

      .operator:hover {
        background: #2953c8;
      }

      .danger {
        background: #e60000;
        color: #ffffff;
      }

      .danger:hover {
        background: #c40000;
      }

      .equals {
        grid-column: span 2;
        background: #1f9d68;
        color: #ffffff;
      }

      .equals:hover {
        background: #188457;
      }
    </style>
  </head>
  <body>
    <main class="calculator" aria-label="Калькулятор">
      <div class="display" id="display" aria-live="polite">0</div>
      <div class="keys">
        <button class="danger" data-action="clear">C</button>
        <button data-action="backspace">⌫</button>
        <button class="operator" data-value="/">÷</button>
        <button class="operator" data-value="*">×</button>
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-value="-">−</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-value="+">+</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value=".">.</button>
        <button data-value="0">0</button>
        <button class="equals" data-action="calculate">=</button>
      </div>
    </main>

    <script>
      const display = document.getElementById("display");
      const keys = document.querySelector(".keys");
      let expression = "";

      function updateDisplay(value) {
        display.textContent = value || "0";
      }

      function appendValue(value) {
        const lastChar = expression.at(-1);
        const operators = ["+", "-", "*", "/"];

        if (operators.includes(value) && operators.includes(lastChar)) {
          expression = expression.slice(0, -1) + value;
        } else {
          expression += value;
        }

        updateDisplay(expression);
      }

      function calculate() {
        if (!expression) {
          return;
        }

        try {
          const result = Function(`"use strict"; return (${expression})`)();

          if (!Number.isFinite(result)) {
            throw new Error("Invalid result");
          }

          expression = String(Math.round((result + Number.EPSILON) * 1e10) / 1e10);
          updateDisplay(expression);
        } catch {
          expression = "";
          updateDisplay("Ошибка");
        }
      }

      keys.addEventListener("click", (event) => {
        const button = event.target.closest("button");

        if (!button) {
          return;
        }

        const { value, action } = button.dataset;

        if (value) {
          appendValue(value);
        }

        if (action === "clear") {
          expression = "";
          updateDisplay(expression);
        }

        if (action === "backspace") {
          expression = expression.slice(0, -1);
          updateDisplay(expression);
        }

        if (action === "calculate") {
          calculate();
        }
      });

      document.addEventListener("keydown", (event) => {
        const allowedKeys = "0123456789+-*/.";

        if (allowedKeys.includes(event.key)) {
          appendValue(event.key);
        }

        if (event.key === "Enter") {
          calculate();
        }

        if (event.key === "Backspace") {
          expression = expression.slice(0, -1);
          updateDisplay(expression);
        }

        if (event.key === "Escape") {
          expression = "";
          updateDisplay(expression);
        }
      });
    </script>
  </body>
</html>
